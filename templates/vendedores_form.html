{% extends 'base.html' %}

{% block title %}{% if vendedor %}Editar Vendedor{% else %}Novo Vendedor{% endif %}{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="card shadow rounded p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-primary mb-0">
                {% if vendedor %}Editar Vendedor{% else %}Novo Vendedor{% endif %}
            </h3>
            <a href="{{ url_for('listar_vendedores') }}" class="btn btn-secondary">Voltar</a>
        </div>

        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Empresa</label>
                    <select name="empresa_id" class="form-select" required>
                        <option value="">Selecione</option>
                        {% for empresa in empresas %}
                            <option value="{{ empresa.id }}"
                                {% if vendedor and vendedor.empresa_id == empresa.id %}selected{% endif %}>
                                {{ empresa.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Comercial</label>
                    <select name="comercial_id" class="form-select">
                        <option value="">Selecione</option>
                        {% for comercial in comerciais %}
                            <option value="{{ comercial.id }}"
                                {% if vendedor and vendedor.comercial_id == comercial.id %}selected{% endif %}>
                                {{ comercial.nome }} - {{ comercial.empresa.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control"
                           value="{{ vendedor.nome if vendedor else '' }}" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control"
                           value="{{ vendedor.telefone if vendedor and vendedor.telefone else '' }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">CPF</label>
                    <input type="text" name="cpf" class="form-control"
                           value="{{ vendedor.cpf if vendedor and vendedor.cpf else '' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ vendedor.email if vendedor and vendedor.email else '' }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Comissão (%)</label>
                    <input type="text" name="comissao_percentual" class="form-control"
                           value="{{ vendedor.comissao_percentual if vendedor and vendedor.comissao_percentual is not none else '' }}">
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo"
                               {% if vendedor %}{% if vendedor.ativo %}checked{% endif %}{% else %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">Ativo</label>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Observações</label>
                    <textarea name="observacoes" class="form-control" rows="4">{{ vendedor.observacoes if vendedor and vendedor.observacoes else '' }}</textarea>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('listar_vendedores') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
