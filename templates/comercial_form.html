{% extends 'base.html' %}

{% block title %}{% if comercial %}Editar Comercial{% else %}Novo Comercial{% endif %}{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="card shadow rounded p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-primary mb-0">
                {% if comercial %}Editar Comercial{% else %}Novo Comercial{% endif %}
            </h3>
            <a href="{{ url_for('listar_comerciais') }}" class="btn btn-secondary">Voltar</a>
        </div>

        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Empresa</label>
                    <select name="empresa_id" class="form-select" required>
                        <option value="">Selecione</option>
                        {% for empresa in empresas %}
                            <option value="{{ empresa.id }}"
                                {% if comercial and comercial.empresa_id == empresa.id %}selected{% endif %}>
                                {{ empresa.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control"
                           value="{{ comercial.nome if comercial else '' }}" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Descrição</label>
                    <input type="text" name="descricao" class="form-control"
                           value="{{ comercial.descricao if comercial and comercial.descricao else '' }}">
                </div>

                <div class="col-12">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo"
                               {% if comercial %}{% if comercial.ativo %}checked{% endif %}{% else %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">Ativo</label>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('listar_comerciais') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
