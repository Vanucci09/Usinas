<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | GUS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --solar-blue: #0a192f;
            --cell-border: rgba(255, 255, 255, 0.08);
            --busbar-line: rgba(255, 255, 255, 0.05);
            --solar-gold: #ffcc00;
        }

        body {
            background-color: var(--solar-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- Fundo Estilizado como Painel Solar --- */
        .solar-panel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Cria a grade das células solares */
            background-image: 
                linear-gradient(var(--cell-border) 2px, transparent 2px),
                linear-gradient(90deg, var(--cell-border) 2px, transparent 2px),
                linear-gradient(var(--busbar-line) 1px, transparent 1px);
            background-size: 120px 120px, 120px 120px, 120px 10px;
            z-index: 0;
        }

        /* Reflexo de luz na "placa" */
        .solar-panel-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.05) 0%, 
                rgba(255,255,255,0) 50%, 
                rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        /* Brilho do Sol (Flare) */
        .sun-flare {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.1) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 1;
        }

        /* --- Conteúdo do Login --- */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo-box {
            background-color: white;
            padding: 10px 15px;
            display: inline-block;
            border-radius: 4px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-box img {
            height: 50px;
        }

        .system-title {
            color: white;
            font-size: 1.6rem;
            line-height: 1.2;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .system-title strong {
            color: var(--solar-gold);
            font-weight: 800;
        }

        /* Inputs */
        .form-control {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.7);
            border-color: var(--solar-gold);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Botão INICIAR com Animação de Carga */
        .btn-iniciar {
            background: linear-gradient(90deg, #8e44ad, #6c5ce7);
            border: none;
            border-radius: 50px;
            padding: 12px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 180px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .btn-iniciar:hover {
            transform: scale(1.05);
            color: white;
        }

        /* Barra de carregamento estilo bateria */
        .loading-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-iniciar.loading .loading-bar {
            animation: charge-battery 1.5s infinite;
        }

        @keyframes charge-battery {
            0% { width: 0%; }
            100% { width: 100%; }
        }

    </style>
</head>
<body>

<div class="solar-panel-bg"></div>
<div class="sun-flare"></div>

<div class="login-container">
    <div class="login-card">
        <div class="logo-box">
            <img src="{{ url_for('static', filename='img/LogoEmpresa.jpg') }}" alt="CGR Energia">
        </div>

        <div class="system-title">
            Sistema de Gestão<br>
            de Usinas Solares<br>
            <strong>GUS</strong>
        </div>

        {% if erro %}
            <div class="alert alert-danger py-2" style="font-size: 0.8rem;">{{ erro }}</div>
        {% endif %}

        <form id="loginForm" method="POST">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="E-mail" required>
            </div>
            <div class="mb-4">
                <input type="password" name="senha" class="form-control" placeholder="Senha" required>
            </div>
            
            <button type="submit" id="btnSubmit" class="btn btn-iniciar">
                <div class="loading-bar"></div>
                <span>INICIAR</span>
            </button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnSubmit');

    form.onsubmit = function() {
        btn.classList.add('loading');
        btn.querySelector('span').innerText = "CONECTANDO...";
    };
</script>

</body>
</html>
