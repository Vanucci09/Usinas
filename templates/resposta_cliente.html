<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resposta do Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow p-5 text-center">

        {% if tipo == 'aceita' %}
            <h2 class="text-success mb-3">✔ Proposta Aprovada</h2>
            <p class="text-muted">Obrigado! Sua aprovação foi registrada com sucesso.</p>

        {% elif tipo == 'recusada' %}
            <h2 class="text-danger mb-3">✖ Proposta Recusada</h2>
            <p class="text-muted">Sua resposta foi registrada. Se quiser, podemos ajustar a proposta.</p>

        {% endif %}

    </div>

</div>

</body>
</html>
