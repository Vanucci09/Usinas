<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Gerações - Usinas</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #357ABD;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --danger-color: #e74c3c;
            --success-color: #27ae60;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header e Navegação */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        .btn-add {
            background-color: var(--success-color);
            color: white;
        }

        .btn-add:hover {
            background-color: #219150;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* Card de Filtros */
        .filter-card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #636e72;
        }

        .input-group input, .input-group select {
            padding: 10px;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            outline: none;
            min-width: 180px;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .btn-filter {
            background-color: var(--primary-color);
            color: white;
            min-width: 120px;
        }

        .btn-filter:hover {
            background-color: var(--secondary-color);
        }

        /* Tabela */
        .table-container {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 0.95rem;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        table tr:nth-child(even) {
            background-color: #fafbfc;
        }

        table tr:hover {
            background-color: #f1f7ff;
        }

        /* Ações */
        .actions {
            display: flex;
            gap: 10px;
        }

        .edit-link {
            color: var(--primary-color);
        }

        .delete-link {
            color: var(--danger-color);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #b2bec3;
        }

        @media (max-width: 768px) {
            .filter-form {
                flex-direction: column;
                align-items: stretch;
            }
            .input-group input, .input-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <a href="{{ url_for('index') }}" class="btn btn-back">
            ← Voltar
        </a>
        
        <a href="{{ url_for('cadastrar_geracao') }}" class="btn btn-add">
            + Nova Geração
        </a>
    </div>

    <h1>Relatório de Gerações</h1>

    <div class="filter-card">
        <form method="GET" action="{{ url_for('listar_geracoes') }}" class="filter-form">
            <div class="input-group">
                <label for="data_inicio">Data Início</label>
                <input type="date" id="data_inicio" name="data_inicio" value="{{ data_inicio_default }}">
            </div>
            
            <div class="input-group">
                <label for="data_fim">Data Fim</label>
                <input type="date" id="data_fim" name="data_fim" value="{{ data_fim_default }}">
            </div>

            <div class="input-group">
                <label for="usina_id">Usina</label>
                <select id="usina_id" name="usina_id">
                    <option value="">Todas as Usinas</option>
                    {% for usina in usinas %}
                        <option value="{{ usina['id'] }}">{{ usina['nome'] }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-filter">Filtrar</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Usina</th>
                    <th>Data de Referência</th>
                    <th>Energia Gerada</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for geracao in geracoes %}
                    <tr>
                        <td><strong>{{ geracao['nome'] }}</strong></td>
                        <td>{{ geracao['data'] }}</td>
                        <td>{{ geracao['energia_kwh'] }} <small>kWh</small></td>
                        <td class="actions">
                            <a class="edit-link" href="{{ url_for('editar_geracao', id=geracao['id_geracao']) }}">Editar</a>
                            <span style="color: #ddd">|</span>
                            <a class="delete-link" href="{{ url_for('excluir_geracao', id=geracao['id_geracao']) }}" onclick="return confirm('Tem certeza que deseja excluir este registro?');">Excluir</a>
                        </td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="4" class="empty-state">Nenhum dado encontrado para o período selecionado.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
