{% extends 'base.html' %}

{% block title %}
Cadastrar Usuário
{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="card p-4 p-md-5 shadow-sm mx-auto card-auth bg-white">
        
        <div class="d-flex align-items-center gap-3 mb-4 border-bottom pb-3">
            <div class="bg-primary-subtle text-primary rounded-circle p-3 d-inline-flex">
                <i class="bi bi-person-plus-fill fs-3"></i>
            </div>
            <div>
                <h3 class="mb-1 text-dark fw-bold" style="letter-spacing: -0.5px;">Novo Usuário</h3>
                <p class="text-muted small mb-0">Cadastre um novo colaborador e defina seus níveis de acesso ao sistema.</p>
            </div>
        </div>

        <form method="POST">
            
            <h5 class="text-secondary fw-semibold mb-3 small text-uppercase" style="letter-spacing: 0.5px;">Informações Pessoais</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" name="nome" class="form-control border-start-0 ps-0" placeholder="Ex: João Silva" required>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary">E-mail Corporativo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="nome@cgr.com" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary">Senha de Acesso</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" name="senha" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-medium text-secondary">Perfil do Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-shield-lock"></i></span>
                        <select name="perfil" class="form-select border-start-0 ps-0">
                            <option value="usuario">Usuário comum</option>
                            <option value="comercial">Comercial</option>
                            <option value="gerente_comercial">Gerente Comercial</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="permission-section mb-4">
                <h6 class="fw-bold text-primary text-uppercase mb-3 d-flex align-items-center gap-2" style="font-size: 0.85rem; letter-spacing: 0.5px;">
                    <i class="bi bi-sliders"></i> Níveis de Acesso & Permissões Especiais
                </h6>
                
                <div class="row g-3">
                    <div class="col-md-6 col-lg-4">
                        <div class="form-check form-switch bg-white p-3 rounded border shadow-sm h-100 ps-5 d-flex align-items-center">
                            <input class="form-check-input ms-4" type="checkbox" name="pode_cadastrar_geracao" id="geracao" style="transform: scale(1.2); margin-top: 0;">
                            <label class="form-check-label fw-medium text-dark ms-2" for="geracao">Cadastrar Geração</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-4">
                        <div class="form-check form-switch bg-white p-3 rounded border shadow-sm h-100 ps-5 d-flex align-items-center">
                            <input class="form-check-input ms-4" type="checkbox" name="pode_cadastrar_cliente" id="cliente" style="transform: scale(1.2); margin-top: 0;">
                            <label class="form-check-label fw-medium text-dark ms-2" for="cliente">Cadastrar Clientes</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-4">
                        <div class="form-check form-switch bg-white p-3 rounded border shadow-sm h-100 ps-5 d-flex align-items-center">
                            <input class="form-check-input ms-4" type="checkbox" name="pode_cadastrar_fatura" id="fatura" style="transform: scale(1.2); margin-top: 0;">
                            <label class="form-check-label fw-medium text-dark ms-2" for="fatura">Cadastrar Faturas</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-6">
                        <div class="form-check form-switch bg-white p-3 rounded border shadow-sm h-100 ps-5 d-flex align-items-center">
                            <input class="form-check-input ms-4" type="checkbox" name="pode_acessar_financeiro" id="financeiro" style="transform: scale(1.2); margin-top: 0;">
                            <label class="form-check-label fw-medium text-dark ms-2" for="financeiro">Acesso Completo ao Financeiro</label>
                        </div>
                    </div>
                    
                    <div class="col-md-12 col-lg-6">
                        <div class="form-check form-switch bg-white p-3 rounded border shadow-sm h-100 ps-5 d-flex align-items-center">
                            <input class="form-check-input ms-4" type="checkbox" name="pode_acessar_comercial" id="comercial" style="transform: scale(1.2); margin-top: 0;">
                            <label class="form-check-label fw-medium text-dark ms-2" for="comercial">Acesso Completo ao Comercial</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row pt-2 align-items-center g-3">
                <div class="col-sm-6 order-2 order-sm-1 text-center text-sm-start">
                    <a href="/" class="btn btn-link text-muted text-decoration-none me-2">
                        <i class="bi bi-house-door"></i> Início
                    </a>
                    <a href="/usuarios" class="btn btn-outline-primary px-3">
                        <i class="bi bi-people-fill me-1"></i> Lista de Usuários
                    </a>
                </div>
                <div class="col-sm-6 order-1 order-sm-2 text-center text-sm-end">
                    <button type="submit" class="btn btn-success px-5 py-2 fw-semibold shadow-sm w-100 w-sm-auto">
                        <i class="bi bi-check-circle-fill me-2"></i>Concluir Cadastro
                    </button>
                </div>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
