<!-- templates/importar_conta_concessionaria.html -->

{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <h4 class="mb-4">
                <i class="bi bi-upload"></i>
                Importar Conta
            </h4>

            <form
                method="POST"
                enctype="multipart/form-data">

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Foto ou PDF da Conta
                    </label>

                    <input
                        type="file"
                        name="arquivo"
                        class="form-control"
                        accept=".jpg,.jpeg,.png,.pdf"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-search"></i>
                    Extrair Dados

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
