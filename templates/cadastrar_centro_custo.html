{% extends 'base.html' %}
{% block title %}Cadastrar Centro de Custo{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="text-primary mb-3">Cadastrar Cliente</h2>

  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">

      <!-- EMPRESA -->
      {% if empresa_unica %}
        <input type="hidden" name="empresa_id" value="{{ empresa_unica.id }}">
      {% else %}
      <div class="col-md-6">
        <label class="form-label">Empresa</label>
        <select name="empresa_id" id="empresa_id" class="form-select" required>
          <option value="">Selecione...</option>
          {% for e in empresas %}
          <option value="{{ e.id }}">{{ e.nome }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <!-- CLIENTE -->
      {% if cliente_unico %}
        <input type="hidden" name="cliente_id" value="{{ cliente_unico.id }}">
      {% else %}
      <div class="col-md-6">
        <label class="form-label">Cliente Operacional</label>
        <select name="cliente_id" id="cliente_id" class="form-select" required>
          <option value="">Selecione a empresa primeiro...</option>
        </select>
      </div>
      {% endif %}

      <div class="col-md-4">
        <label class="form-label">Código</label>
        <input type="text" name="codigo" class="form-control" placeholder="(Opcional por enquanto)">
      </div>

      <div class="col-md-8">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">CPF/CNPJ</label>
        <input type="text" id="cpf_cnpj" name="cpf_cnpj" class="form-control">
      </div>

      <div class="col-md-8">
        <label class="form-label">Endereço</label>
        <input type="text" name="endereco" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Telefone</label>
        <input type="text" name="telefone" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control">
      </div>

      <!-- DOCUMENTOS -->
      <div class="col-md-12">
        <label class="form-label">Documentos</label>
        <input type="file" name="documentos" class="form-control" multiple>
      </div>

      <!-- REPRESENTANTE -->
      <div id="blocoRepresentante" class="d-none mt-4">
        <hr>
        <h5>Dados do Representante</h5>

        <div class="row g-3">
          <div class="col-md-6">
            <input type="text" name="representante_nome" id="rep_nome" class="form-control" placeholder="Nome">
          </div>
          <div class="col-md-6">
            <input type="text" name="representante_cpf" id="rep_cpf" class="form-control" placeholder="CPF">
          </div>
          <div class="col-md-6">
            <input type="text" name="representante_telefone" id="rep_tel" class="form-control" placeholder="Telefone">
          </div>
          <div class="col-md-6">
            <input type="email" name="representante_email" id="rep_email" class="form-control" placeholder="Email">
          </div>
          <div class="col-md-12">
            <input type="text" name="representante_endereco" id="rep_end" class="form-control" placeholder="Endereço">
          </div>
        </div>
      </div>

    </div>

    <div class="mt-4">
      <button class="btn btn-success">Salvar</button>
      <a href="{{ url_for('listar_centros_custos') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<script>
const cpfCnpj = document.getElementById('cpf_cnpj');
const bloco = document.getElementById('blocoRepresentante');

function isCNPJ(valor) {
  if (!valor) return false;
  return valor.replace(/\D/g, '').length > 11;
}

cpfCnpj.addEventListener('input', () => {
  bloco.classList.toggle('d-none', !isCNPJ(cpfCnpj.value));
});

// API clientes
const empresaSel = document.getElementById('empresa_id');
const clienteSel = document.getElementById('cliente_id');

if (empresaSel && clienteSel) {
  empresaSel.addEventListener('change', async () => {
    const resp = await fetch(`/api/empresas/${empresaSel.value}/clientes`);
    const data = await resp.json();

    clienteSel.innerHTML = '<option value="">Selecione...</option>';
    data.forEach(c => {
      clienteSel.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
    });
  });
}
</script>

{% endblock %}
