{% extends 'base.html' %}
{% block title %}{{ 'Editar' if concessionaria else 'Nova' }} Concessionária{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow border-0">
        <div class="card-body">
            <h2 class="text-primary mb-4">{{ 'Editar' if concessionaria else 'Nova' }} Concessionária</h2>

            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control"
                               value="{{ concessionaria.nome if concessionaria else '' }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Estado</label>
                        <input type="text" name="estado" class="form-control"
                               value="{{ concessionaria.estado if concessionaria else '' }}" maxlength="2">
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" name="ativo" class="form-check-input" id="ativo"
                                   {% if not concessionaria or concessionaria.ativo %}checked{% endif %}>
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-between">
                    <a href="{{ url_for('listar_concessionarias') }}" class="btn btn-outline-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
