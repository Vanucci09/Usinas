{% extends 'base.html' %}

{% block title %}Cadastrar Geração Diária{% endblock %}

{% block content %}
<style>
    :root {
        --primary-color: #4A90E2;
        --success-color: #27ae60;
        --info-color: #17a2b8;
    }

    .form-container {
        max-width: 700px;
        margin: 20px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .form-header {
        border-bottom: 2px solid #f1f3f5;
        margin-bottom: 25px;
        padding-bottom: 15px;
    }

    .form-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #dee2e6;
        transition: all 0.2s;
    }

    .form-control:focus, .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
    }

    .btn-custom {
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.1s;
    }

    .btn-custom:active {
        transform: scale(0.98);
    }

    /* Organização dos botões auxiliares */
    .aux-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #f1f3f5;
    }

    .alert {
        border-radius: 8px;
        border: none;
    }
</style>

<div class="container">
    <div class="form-container">
        <div class="form-header text-center">
            <h2 class="text-primary m-0">Cadastrar Geração Diária</h2>
            <p class="text-muted small">Insira os dados de produção da sua usina solar</p>
        </div>

        {% if mensagem %}
            <div class="alert alert-danger text-center shadow-sm">{{ mensagem }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('cadastrar_geracao') }}">
            <div class="mb-4">
                <label for="usina_id" class="form-label">
                    <i class="bi bi-lightning-charge"></i> Usina Solar
                </label>
                <select name="usina_id" id="usina_id" class="form-select" required>
                    <option value="" disabled {% if not request.form.get('usina_id') %}selected{% endif %}>Selecione a usina...</option>
                    {% for usina in usinas %}
                        <option value="{{ usina['id'] }}" {% if request.form.get('usina_id') == usina['id']|string %}selected{% endif %}>
                            {{ usina['nome'] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="data" class="form-label">Data da Medição</label>
                    <input type="date" id="data" name="data" class="form-control" value="{{ request.form.get('data', '') }}" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label for="energia" class="form-label">Energia (kWh)</label>
                    <div class="input-group">
                        <input type="number" step="0.01" name="energia" id="energia" class="form-control" placeholder="0.00" value="{{ request.form.get('energia', '') }}" required>
                        <span class="input-group-text bg-light">kWh</span>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mt-2">
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-custom order-2 order-sm-1">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
                <button type="submit" class="btn btn-success btn-custom order-1 order-sm-2">
                    <i class="bi bi-check-lg"></i> Salvar Registro
                </button>
            </div>

            <div class="aux-actions">
                <a href="{{ url_for('consulta') }}" class="btn btn-outline-info btn-sm">Consultar</a>
                <a href="{{ url_for('listar_geracoes') }}" class="btn btn-outline-info btn-sm">Editar/Listar</a>
                <a href="{{ url_for('importar_planilha') }}" class="btn btn-outline-info btn-sm">Importar Planilha</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
