<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Termo Assinado</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-sucesso {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(
                0, 0, 0, 0.08
            );
        }

        .icone {
            font-size: 5rem;
            color: #198754;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card card-sucesso">

                    <div class="card-body p-5 text-center">

                        <i class="bi bi-check-circle-fill icone"></i>

                        <h2 class="fw-bold text-success mt-4">
                            Assinatura realizada com sucesso!
                        </h2>

                        <p class="lead mt-3">
                            Obrigado pela confiança.
                        </p>

                        <p class="text-muted">
                            Seu termo de adesão foi
                            assinado eletronicamente
                            e registrado em nosso sistema.
                        </p>

                        {% if conta.termo_assinado_em %}
                        <p class="small text-muted mt-4">
                            Assinado em
                            {{ conta.termo_assinado_em.strftime('%d/%m/%Y às %H:%M') }}
                        </p>
                        {% endif %}

                        <hr>

                        <img
                            src="{{ url_for(
                                'static',
                                filename='Nova_logo_CGR.jpeg'
                            ) }}"
                             style="
                                max-height: 140px;
                                width: auto;
                                margin-bottom: 10px;
                            "
                            alt="CGR Energia">

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
